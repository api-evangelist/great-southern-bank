generated: '2026-07-20'
method: searched
source: https://consumerdatastandardsaustralia.github.io/standards/#security-profile
docs: https://www.greatsouthernbank.com.au/consumer-data-policy
summary:
  types:
  - none
  - oauth2
  - openIdConnect
  - mutualTLS
  note: >-
    The only public, self-serve surface at Great Southern Bank is the Consumer
    Data Right (CDR) Product Reference Data (PRD) API, which is UNAUTHENTICATED
    by standard (no API key, no token). All other CDR banking resource endpoints
    (accounts, balances, transactions, direct debits, scheduled payments, payees)
    are authenticated under the CDR security profile and are reachable ONLY by
    ACCC-accredited data recipients (ADRs). The bank does not issue self-service
    API keys and operates no public developer portal.
