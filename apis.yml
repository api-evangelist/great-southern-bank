name: Great Southern Bank
kind: company
description: Great Southern Bank is one of Australia's largest customer-owned (mutual)
  banks, operating as a business name of Credit Union Australia Ltd (ABN 44 087 650
  959, AFSL and Australian Credit Licence 238317). Formerly known as Credit Union Australia
  (CUA) before rebranding to Great Southern Bank in 2021, it is owned by its customers
  rather than shareholders and serves retail and small-business members with transaction
  accounts, savings, term deposits, home loans, credit cards, and insurance. As an
  Australian authorised deposit-taking institution (ADI) it participates in the Consumer
  Data Right (CDR / Open Banking) as a data holder, exposing public, unauthenticated
  Product Reference Data (PRD) APIs for both its retail and Business+ brands that conform
  to the Data Standards Body (DSB) Consumer Data Standards (CDS). Authenticated consumer
  data sharing is available only to accredited data recipients (ADRs) via the CDR
  ecosystem; the bank does not operate a self-serve public developer portal.
