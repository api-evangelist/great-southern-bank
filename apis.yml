  - url: openapi/great-southern-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right (CDR) Product Reference
    Data (PRD) API for Great Southern Bank's retail banking products (the Get Products
    and Get Product Detail endpoints of the DSB CDS Banking API). No consent or ADR
    accreditation required. Confirmed live at https://api.open-banking.greatsouthernbank.com.au/cds-au/v1/banking/products
    (HTTP 200, x-v 3, 75 products across term deposits, transaction accounts, savings,
    home loans, personal loans, and credit cards). Conforms to the DSB Consumer Data
    Standards banking schema (shared standard, not bank-proprietary).
