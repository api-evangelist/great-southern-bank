    type: OpenAPI
  description: Consumer-authorized Consumer Data Right (CDR) Accounts and Balances
    API for Great Southern Bank — the Get Accounts, Get Account Detail, Get Bulk Balances
    and Get Account Balance endpoints of the DSB CDS Banking API. Access requires a
    consumer to authorize an ACCC-accredited data recipient (ADR) through the CDR
    consent and OIDC/FAPI authorization flow over the bank's MTLS data-holder gateway;
    it is not open to the public. Conforms to the DSB Consumer Data Standards banking
    schema (shared standard, not bank-proprietary).
